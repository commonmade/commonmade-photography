<!doctype html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CommonMade Photography</title>
  <meta name="description" content="커먼메이드 포토그래피 | 감각적인 본식 스냅 잊지 못할 당신의 순간을 기록합니다." />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="CommonMade Photography" />
  <meta property="og:description" content="커먼메이드 포토그래피 | 감각적인 본식 스냅 잊지 못할 당신의 순간을 기록합니다." />
  <meta property="og:site_name" content="CommonMade Photography" />
  <!-- 링크 공유 시 보여질 대표 이미지 (public 폴더 내 og-image.png 필수) -->
  <meta property="og:image" content="/og-image.png" />

  <!-- EmailJS Public Key Loading (Deferred) -->
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js" defer></script>
  <script type="text/javascript">
    window.addEventListener("DOMContentLoaded", function () {
      if (typeof emailjs !== "undefined") {
        emailjs.init({
          publicKey: "JaCqR7rJhlmJxrPPI",
        });
      }
    });
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
